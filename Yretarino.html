<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirect Target</title>
</head>
<body>
  <script>
    // Minimal Vercel redirect target (keeps your existing routing simple).
    // If you want the full page, copy the contents of index.html into this file.
    window.location.replace('/text.html');
  </script>
  <noscript>
    <a href="/text.html">Go to the site</a>
  </noscript>
</body>
</html>
